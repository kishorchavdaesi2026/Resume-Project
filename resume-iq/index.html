<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResumeIQ - Premium AI Resume Builder</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Build a job-winning, ATS-optimized resume in minutes with ResumeIQ. Harnessing advanced AI to elevate your career.">
  <meta name="keywords" content="AI resume builder, ATS-friendly resume, professional resume generator, cv maker">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div class="app-wrapper">
    <!-- Left Panel: Form Section (40%) -->
    <main class="left-panel" id="left-panel">
      <div class="panel-content">
        <!-- Logo -->
        <header class="brand-logo" id="brand-logo">
          <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L14.85 9.15L22 12L14.85 14.85L12 22L9.15 14.85L2 12L9.15 9.15L12 2Z" fill="url(#logo-grad)"/>
            <defs>
              <linearGradient id="logo-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#67E8F9" />
                <stop offset="50%" stop-color="#2563EB" />
                <stop offset="100%" stop-color="#0F172A" />
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">Resume<span class="logo-highlight">IQ</span></span>
        </header>

        <!-- Login Card -->
        <div class="login-card" id="login-card">
          <div class="card-header">
            <h1 class="card-title">Elevate your career</h1>
            <p class="card-subtitle">Sign in to build your professional AI-powered resume.</p>
          </div>

          <!-- Social Login Buttons -->
          <div class="social-login-group">
            <button class="btn-social" id="btn-google" aria-label="Sign in with Google">
              <svg class="social-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.87-2.6-2.86-4.53-2.86-4.53z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
              </svg>
              Google
            </button>
            <button class="btn-social" id="btn-linkedin" aria-label="Sign in with LinkedIn">
              <svg class="social-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z" fill="#0A66C2"/>
              </svg>
              LinkedIn
            </button>
          </div>

          <div class="separator">
            <span>or sign in with email</span>
          </div>

          <!-- Login Form -->
          <form class="login-form" id="login-form" autocomplete="on">
            <div class="input-group">
              <label for="email" class="input-label">Email address</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M22 6C22 4.9 21.1 4 20 4H4C2.9 4 2 4.9 2 6V18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6ZM20 6L12 11L4 6H20ZM20 18H4V8L12 13L20 8V18Z" fill="currentColor"/>
                </svg>
                <input type="email" id="email" class="input-field" placeholder="name@company.com" required autocomplete="email">
              </div>
            </div>

            <div class="input-group">
              <label for="password" class="input-label">Password</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M18 8H17V6C17 3.24 14.76 1 12 1C9.24 1 7 3.24 7 6V8H6C4.9 8 4 8.9 4 10V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V10C20 8.9 19.1 8 18 8ZM9 6C9 4.34 10.34 3 12 3C13.66 3 15 4.34 15 6V8H9V6ZM18 20H6V10H18V20ZM12 13C10.9 13 10 13.9 10 15C10 16.1 10.9 17 12 17C13.1 17 14 16.1 14 15C14 13.9 13.1 13 12 13Z" fill="currentColor"/>
                </svg>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required autocomplete="current-password">
              </div>
            </div>

            <div class="form-actions">
              <label class="remember-me">
                <input type="checkbox" id="remember" class="checkbox-input">
                <span class="checkbox-custom"></span>
                <span class="checkbox-label">Remember me</span>
              </label>
              <a href="#" class="forgot-link" id="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="btn-submit" id="btn-submit">
              <span class="btn-text">Sign in to ResumeIQ</span>
              <span class="btn-glow"></span>
            </button>
          </form>

          <div class="card-footer">
            <p>Don't have an account? <a href="#" class="signup-link" id="signup-link">Create one for free</a></p>
          </div>
        </div>

        <!-- Footer terms -->
        <footer class="footer-terms" id="footer-terms">
          <p>© 2026 ResumeIQ. Built for global builders. <a href="#">Terms</a> &bull; <a href="#">Privacy</a></p>
        </footer>
      </div>
    </main>

    <!-- Right Panel: Visual 3D Hero Section (60%) -->
    <section class="right-panel" id="right-panel" aria-label="ResumeIQ AI Engine Preview">
      <!-- Aurora background overlays -->
      <div class="aurora-container">
        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2"></div>
        <div class="aurora aurora-3"></div>
      </div>
      <!-- Radial overlays & light beams -->
      <div class="light-beam"></div>
      <div class="vignette"></div>

      <!-- Live WebGL Canvas container -->
      <div id="canvas-container"></div>

      <!-- Floating Tech Status Indicator -->
      <div class="status-overlay" id="status-overlay">
        <span class="status-dot"></span>
        <span class="status-text">ResumeIQ AI Engine v2.0 - Active</span>
      </div>
    </section>
  </div>

  <!-- Custom Logic & Three.js animations -->
  <script src="app.js"></script>
</body>
</html>
